{% extends "base.html" %}
{% from "_macros.html" import field %}
{% block title %}Reset password{% endblock %}
{% block content %}
<section class="auth">
  <div class="card receipt">
    <h1>Reset your password</h1>
    <p class="sub">Enter your email and we'll send a reset link.</p>
    <form method="post" novalidate>
      {{ form.hidden_tag() }}
      {{ field(form.email) }}
      <button class="btn btn-block" type="submit">Send reset link</button>
    </form>
    <p class="altrow"><a href="{{ url_for('auth.login') }}">Back to log in</a></p>
  </div>
</section>
{% endblock %}
